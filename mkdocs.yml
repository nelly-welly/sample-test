site_name: "Sample Documentation"
site_description: "An end-to-end documentation walkthrough for issuing and reconciling a refund on a fictional payments platform."
site_author: "Neelam"
site_url: "https://nelly-welly.github.io/sample-test/"

nav:
  - Home: index.md
  - Concepts:
      - "Payment operations at a glance": concept-topics/index.md
      - "Authorize a payment": concept-topics/authorize-overview.md
      - "Charge a payment": concept-topics/charge-overview.md
      - "Cancel a payment": concept-topics/cancel-overview.md
      - "Refund a payment": concept-topics/refund-overview.md
  - Refund workflow:
      - Overview: refund-workflow/index.md
      - Before you start: refund-workflow/before-you-begin.md
      - "Step 1 — Create the refund": refund-workflow/create-refund.md
      - "Step 2 — Confirm in the dashboard": refund-workflow/confirm-in-the-dashboard.md
      - "Step 3 — Reconcile the ledger": refund-workflow/reconcile-ledger.md
      - Troubleshoot: refund-workflow/troubleshoot.md
      - Reference: refund-workflow/reference.md

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: "Sample portfolio content. PayCart is fictional. All names, IDs, amounts, and events are invented."
